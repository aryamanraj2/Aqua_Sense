; AquaSense Sentinel Node — PlatformIO configuration
; Target: ESP32-S3-DevKitC-1 (or custom Sentinel PCB rev-C)
; Framework: Arduino (ESP-IDF component)

[env:sentinel_s3]
platform  = espressif32 @ ^6.5.0
board     = esp32-s3-devkitc-1
framework = arduino

; Flash / PSRAM
board_build.arduino.memory_type = qio_opi
board_upload.flash_size          = 16MB

; Serial monitor
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, colorize

; Build flags
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; Sentinel firmware version — bump on every release
    -DSENTINEL_FW_VERSION=\"0.4.2\"
    -DSENTINEL_HW_REVISION=\"rev-C\"
    ; SoftAP credentials (override in secrets.h — never commit real values)
    -DSOFTAP_SSID=\"AquaSentinel-AP\"
    -DSOFTAP_PASS=\"aqua1234\"
    ; Backend base URL (reachable over SoftAP)
    -DBACKEND_URL=\"http://192.168.4.2:8000/api/v1\"
    ; Safety thresholds (mirror hardware_contract.md §4)
    -DDO_FLOOR_MG_L=4.0f
    -DMAX_SINGLE_DOSE_ML=15.0f
    -DMIN_DOSE_INTERVAL_MS=600000UL

; Library dependencies
lib_deps =
    ; I2C / sensor drivers
    adafruit/Adafruit ADS1X15 @ ^2.5.0
    adafruit/Adafruit BusIO  @ ^1.14.5
    milesburton/DallasTemperature @ ^3.11.0
    paulstoffregen/OneWire @ ^2.3.7
    ; HTTP client
    arduino-libraries/ArduinoHttpClient @ ^0.5.0
    ; JSON
    bblanchon/ArduinoJson @ ^7.0.4
    ; LoRa
    sandeepmistry/LoRa @ ^0.8.0

[env:sentinel_s3_ota]
extends          = env:sentinel_s3
upload_protocol  = espota
upload_port      = 192.168.4.1       ; node SoftAP IP
upload_flags     = --port=3232
